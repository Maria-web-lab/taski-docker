volumes:
  pg_data:
  static:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - taski_network

  backend:
    build: ./backend/
    env_file: .env
    volumes:
      - static:/backend_static
    depends_on:
      - db
    networks:
      - taski_network

  frontend:
    build: ./frontend/
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
    networks:
      - taski_network

  gateway:
    build: ./gateway/
    ports:
      - "8000:80"
    volumes:
      - static:/staticfiles/
    depends_on:
      - backend
      - frontend
    networks:
      - taski_network

networks:
  taski_network:
    driver: bridge
